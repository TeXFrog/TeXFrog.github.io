title: TeXFrog
description: "A tool for managing game-hopping proofs in LaTeX"
theme: just-the-docs

url: https://texfrog.github.io
baseurl: ""

aux_links:
  "View on GitHub": "https://github.com/TeXFrog/TeXFrog"
aux_links_new_tab: true

footer_content: 'TeXFrog is released under the <a href="https://github.com/TeXFrog/TeXFrog/blob/main/LICENSE.txt">Apache License 2.0</a>.'

color_scheme: light

search_enabled: true
search.heading_level: 3

back_to_top: true
back_to_top_text: "Back to top"

exclude:
  - Gemfile.lock
  - node_modules
  - vendor

callouts:
  highlight:
    color: yellow
  important:
    color: blue
  new:
    color: green
  note:
    color: purple
  warning:
    color: red
